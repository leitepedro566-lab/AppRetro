name: Build AppRetro

on:
  
  workflow_dispatch:

jobs:
  build:
    name: Build IPA with Theos
    runs-on: macos-latest
    
    env:
      THEOS: ${{ github.workspace }}/theos
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          brew install ldid dpkg make

      - name: Setup Theos & SDKs
        run: |
          echo "Cloning Theos..."
          git clone --recursive https://github.com/theos/theos.git $THEOS
          
          echo "Cloning iOS SDKs..."
          rm -rf $THEOS/sdks
          git clone https://github.com/theos/sdks.git $THEOS/sdks

      - name: Build and Package
        run: |
          # 1. 编译并生成 deb 包
          make package FINALPACKAGE=1
          
          # 2. 从完美生成的 deb 包中提取并转换 IPA
          echo "正在从 deb 提取并转换 IPA..."
          mkdir -p deb_unpacked
          dpkg-deb -x packages/*.deb deb_unpacked/
          
          mkdir -p Payload
          cp -r deb_unpacked/Applications/*.app Payload/
          zip -r9 AppRetro.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AppRetro-Release
          path: AppRetro.ipa
          if-no-files-found: error
